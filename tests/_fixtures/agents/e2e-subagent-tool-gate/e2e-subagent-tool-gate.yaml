name: e2e-subagent-tool-gate
description: |
  E2E fixture: sub-agent TOOL_CALL ASK pass-through.

  The toolworker sub-agent has a LOCAL function tool (echo)
  and a worker_tool_gate policy that ASKs on tool_call:echo.
  The test asserts the nested echo tool registers with the
  spawned child's executor and that the sub-agent's TOOL_CALL
  ASK is a non-interactive pass-through (no banner tunnels to
  the root REPL — see #765).

  The toolworker runs on a distinct model (gpt-4o-mini) from
  the parent (gpt-4o) so the mock LLM's per-model keyed queues
  keep the parent's and sub-agent's scripted calls separate.

executor:
  model: gpt-4o

prompt: |
  # E2E sub-agent-tool-gate parent

  Supervisor agent. For every user message, spawn the
  ``toolworker`` sub-agent with the user's message as its
  input. After the worker returns, summarize in one short
  sentence. Never handle the user's message directly.

tools:
  toolworker:
    type: agent
    description: |
      Sub-agent with a LOCAL Python tool (echo) and a
      TOOL_CALL ASK policy on tool_call:echo.
    executor:
      model: gpt-4o-mini
    prompt: |
      # Toolworker sub-agent

      You MUST call the ``echo`` tool exactly once with whatever
      the supervisor delegates, then reply in one short sentence
      that includes the tool output. Never skip the tool call.
    tools:
      echo:
        type: function
        description: Echo the input message unchanged (with stable prefix).
        callable: tests._fixtures.agents._echo_tool.echo
    policies:
      worker_tool_gate:
        type: function
        on: [tool_call:echo]
        function:
          path: omnigent.policies.function.make_fixed_action_callable
          arguments:
            action: ask
            reason: Confirm sub-agent may run the echo tool.
            on_phases: [tool_call]
            on_tools: [echo]
